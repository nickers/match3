name: Build Multiplatform Artifacts

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop-jar:
    name: Desktop JAR (${{ matrix.os-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-name: Linux
            artifact-name: desktop-jar-linux
          - os: windows-latest
            os-name: Windows
            artifact-name: desktop-jar-windows
          - os: macos-latest
            os-name: macOS
            artifact-name: desktop-jar-macos

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build uber JAR
        run: ./gradlew :composeApp:packageUberJarForCurrentOS

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: composeApp/build/compose/jars/*.jar

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: androidApp/build/outputs/apk/debug/*.apk

  js-web:
    name: JS Web Distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build JS production bundle
        run: ./gradlew :composeApp:jsBrowserDistribution

      - uses: actions/upload-artifact@v4
        with:
          name: js-web-distribution
          path: composeApp/build/dist/js/productionExecutable/

  deploy-preview:
    name: Deploy preview to Cloudflare Pages
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: [js-web]
    environment: Production
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment-url: ${{ steps.cloudflare_deploy.outputs.deployment-url }}
    steps:
      - name: Download web distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: js-web-distribution
          path: dist

      - name: Deploy to Cloudflare Pages (preview)
        id: cloudflare_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=pr-${{ github.event.pull_request.number }}

  deploy-production:
    name: Deploy production to Cloudflare Pages
    if: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') }}
    runs-on: ubuntu-latest
    needs: [js-web]
    environment: Production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download web distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: js-web-distribution
          path: dist

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=${{ github.ref_name }}

  status-comment:
    name: PR status comment
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Comment PR with preview link
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.deployment-url }}
        with:
          script: |
            const marker = '<!-- cloudflare-pages-preview -->';
            const previewUrl = process.env.PREVIEW_URL;
            const body = `${marker}
            ## Cloudflare Pages Preview

            ${previewUrl
              ? `- **Preview URL:** [${previewUrl}](${previewUrl})`
              : '- Preview URL not available in deploy job outputs.'}
            `;

            const pr = context.payload.pull_request;
            if (!pr) return;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });

            const existing = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
